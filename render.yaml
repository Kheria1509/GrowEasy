services:
  - type: web
    name: groweasy-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd Backend && npm install && npm run build
    startCommand: cd Backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: AI_BATCH_SIZE
        value: 25
      - key: AI_MAX_RETRIES
        value: 3
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: groweasy-frontend
          property: url

  - type: web
    name: groweasy-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: cd Frontend && npm install && npm run build
    startCommand: cd Frontend && npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: groweasy-backend
          property: url
